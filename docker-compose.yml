version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: comissoes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comissoes}
      POSTGRES_USER: ${POSTGRES_USER:-comissoes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comissoes123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comissoes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: comissoes-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-comissoes}:${POSTGRES_PASSWORD:-comissoes123}@postgres:5432/${POSTGRES_DB:-comissoes}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-2026}
      PORT: 3001
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: comissoes-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  postgres_data:
  uploads_data:

networks:
  default:
    name: comissoes-net
